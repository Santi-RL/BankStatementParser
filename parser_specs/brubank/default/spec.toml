[meta]
bank_id = "brubank"
format_id = "default"
version = 3
status = "published"
country = "AR"
currency_default = "ARS"
display_name = "Brubank"

[detect]
required_keywords = [
  "Mi cuenta Resumen",
  "Fecha Ref Descripción Débito Crédito Saldo",
  "Brubank S.A.U.",
]
excluded_keywords = []
min_score = 0.66

[extract]
strategy = "line_regex"
reject_description_amount_tail = true
section_start_patterns = ['^Movimientos$']
stop_patterns = ['^Los depósitos en pesos', '^Brubank S\.A\.U\.']
ignore_patterns = [
  '^Fecha\s+Ref\s+Descripción\s+Débito\s+Crédito\s+Saldo$',
  '^Mi cuenta Resumen$',
  '^Movimientos$',
  '^Sin Movimientos$',
]
line_pattern = '^(?P<date>\d{2}-\d{2}-\d{2})\s+(?P<reference>\S+)\s+(?P<description>.+?)\s+(?:(?:U\$S|\$)\s*)?(?P<debit>\d{1,3}(?:\.\d{3})*,\d{2}|-)\s+(?:(?:U\$S|\$)\s*)?(?P<credit>\d{1,3}(?:\.\d{3})*,\d{2}|-)\s+(?:U\$S|\$)\s*(?P<balance>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
candidate_pattern = '^\d{2}-\d{2}-\d{2}\s+\S+\s+'
multiline = false

[[extract.sections]]
name = "movements"
start_patterns = ['^Movimientos$']
stop_patterns = ['^Los depósitos en pesos', '^Brubank S\.A\.U\.']
ignore_patterns = [
  '^Fecha\s+Ref\s+Descripción\s+Débito\s+Crédito\s+Saldo$',
  '^Mi cuenta Resumen$',
  '^Movimientos$',
  '^Sin Movimientos$',
]
line_pattern = '^(?P<date>\d{2}-\d{2}-\d{2})\s+(?P<reference>\S+)\s+(?P<description>.+?)\s+(?:(?:U\$S|\$)\s*)?(?P<debit>\d{1,3}(?:\.\d{3})*,\d{2}|-)\s+(?:(?:U\$S|\$)\s*)?(?P<credit>\d{1,3}(?:\.\d{3})*,\d{2}|-)\s+(?:U\$S|\$)\s*(?P<balance>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
candidate_pattern = '^\d{2}-\d{2}-\d{2}\s+\S+\s+'
multiline = false

[[extract.sections.context_rules]]
action = "activate_scope"
pattern = '^Tipo\s+Caja de ahorro\s+Saldo Inicial\s+(?P<currency_token>\$)\s*\d{1,3}(?:\.\d{3})*,\d{2}$'
scope_id_template = 'bank_account:caja_ahorro_ars'
label_template = 'Caja de ahorro ARS'
product_type = "bank_account"
account_template = 'Caja de ahorro ARS'
currency_template = '{currency_token}'

[[extract.sections.context_rules]]
action = "activate_scope"
pattern = '^Tipo\s+Caja de ahorro\s+Saldo Inicial\s+(?P<currency_token>U\$S)\s*\d{1,3}(?:\.\d{3})*,\d{2}$'
scope_id_template = 'bank_account:caja_ahorro_usd'
label_template = 'Caja de ahorro USD'
product_type = "bank_account"
account_template = 'Caja de ahorro USD'
currency_template = '{currency_token}'

[[extract.sections.context_rules]]
action = "activate_scope"
pattern = '^Tipo\s+Cuenta remunerada\s+Saldo Inicial\s+(?P<currency_token>\$)\s*\d{1,3}(?:\.\d{3})*,\d{2}$'
scope_id_template = 'bank_account:cuenta_remunerada_ars'
label_template = 'Cuenta remunerada ARS'
product_type = "bank_account"
account_template = 'Cuenta remunerada ARS'
currency_template = '{currency_token}'

[[extract.sections.context_rules]]
action = "update_scope"
pattern = '^Número\s+(?P<account>\S+)$'
account_template = '{account}'
create_if_missing = false

[reconciliation]
tolerance = "0.01"
precision = "0.01"
period_pattern = '^(?P<period_start>\d{1,2}\s+[A-Z]{3}\s+\d{4})\s+al\s+(?P<period_end>\d{1,2}\s+[A-Z]{3}\s+\d{4})$'
period_date_formats = ['%d %b %Y']

[[reconciliation.sections]]
name = "caja_ahorro_ars"
scope_id = "bank_account:caja_ahorro_ars"
currency = "ARS"
opening_pattern = '^Tipo\s+Caja de ahorro\s+Saldo Inicial\s+\$\s*(?P<opening_balance>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
credits_pattern = '^Moneda\s+Pesos\s+\(ARS\)\s+Créditos\s+\$\s*(?P<credits>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
debits_pattern = '^CUIT\s+\S+\s+Débitos\s+\$\s*(?P<debits>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
closing_pattern = '^Imp\.\s+Trans\.\s+Financieras\s+\$\s*-?\d{1,3}(?:\.\d{3})*,\d{2}\s+Saldo Final\s+\$\s*(?P<closing_balance>-?\d{1,3}(?:\.\d{3})*,\d{2})$'

[[reconciliation.sections]]
name = "cuenta_remunerada_ars"
scope_id = "bank_account:cuenta_remunerada_ars"
currency = "ARS"
opening_pattern = '^Tipo\s+Cuenta remunerada\s+Saldo Inicial\s+\$\s*(?P<opening_balance>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
credits_pattern = '^Moneda\s+Pesos\s+\(ARS\)\s+Créditos\s+\$\s*(?P<credits>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
debits_pattern = '^CUIT\s+\S+\s+Débitos\s+\$\s*(?P<debits>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
closing_pattern = '^Imp\.\s+Trans\.\s+Financieras\s+\$\s*-?\d{1,3}(?:\.\d{3})*,\d{2}\s+Saldo Final\s+\$\s*(?P<closing_balance>-?\d{1,3}(?:\.\d{3})*,\d{2})$'

[[reconciliation.sections]]
name = "caja_ahorro_usd"
scope_id = "bank_account:caja_ahorro_usd"
currency = "USD"
opening_pattern = '^Tipo\s+Caja de ahorro\s+Saldo Inicial\s+U\$S\s*(?P<opening_balance>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
credits_pattern = '^Moneda\s+Dólar\s+\(USD\)\s+Créditos\s+U\$S\s*(?P<credits>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
debits_pattern = '^CUIT\s+\S+\s+Débitos\s+U\$S\s*(?P<debits>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
closing_pattern = '^Imp\.\s+Trans\.\s+Financieras\s+U\$S\s*-?\d{1,3}(?:\.\d{3})*,\d{2}\s+Saldo Final\s+U\$S\s*(?P<closing_balance>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
[fields]
date = "date"
description_template = "{reference} {description}"
debit = "debit"
credit = "credit"
balance = "balance"
account_pattern = '(?m)^Número\s+(\S+)$'

[normalize]
date_formats = ['%d-%m-%y']

[normalize.currency_map]
"$" = "ARS"
"ARS" = "ARS"
"U$S" = "USD"
"USD" = "USD"

[change_detection]
min_transactions = 10
min_match_ratio = 0.95
