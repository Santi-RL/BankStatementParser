[meta]
bank_id = "brubank"
format_id = "default"
version = 1
status = "published"
country = "AR"
currency_default = "ARS"
display_name = "Brubank"

[detect]
required_keywords = [
  "Mi cuenta Resumen",
  "Fecha Ref Descripción Débito Crédito Saldo",
  "Brubank S.A.U.",
]
excluded_keywords = []
min_score = 0.66

[extract]
strategy = "line_regex"
section_start_patterns = ['^Movimientos$']
stop_patterns = ['^Mi cuenta Resumen$', '^Sin Movimientos$', '^Los depósitos en pesos']
ignore_patterns = [
  '^Fecha\s+Ref\s+Descripción\s+Débito\s+Crédito\s+Saldo$',
  '^Movimientos$',
]
line_pattern = '^(?P<date>\d{2}-\d{2}-\d{2})\s+(?P<reference>\S+)\s+(?P<description>.+?)\s+(?P<debit>(?:\$\s*)?\d{1,3}(?:\.\d{3})*,\d{2}|-)\s+(?P<credit>(?:\$\s*)?\d{1,3}(?:\.\d{3})*,\d{2}|-)\s+\$\s*(?P<balance>\d{1,3}(?:\.\d{3})*,\d{2})$'
candidate_pattern = '^\d{2}-\d{2}-\d{2}\s+\S+\s+'
multiline = false

[fields]
date = "date"
description_template = "{reference} {description}"
debit = "debit"
credit = "credit"
balance = "balance"
account_pattern = '(?m)^Número\s+(\S+)$'

[normalize]
date_formats = ['%d-%m-%y']

[change_detection]
min_transactions = 10
min_match_ratio = 0.95
