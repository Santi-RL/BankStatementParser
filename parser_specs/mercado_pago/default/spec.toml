[meta]
bank_id = "mercado_pago"
format_id = "default"
version = 1
status = "published"
country = "AR"
currency_default = "ARS"
display_name = "Mercado Pago"

[detect]
required_keywords = [
  "RESUMEN DE CUENTA",
  "DETALLE DE MOVIMIENTOS",
  "CVU",
]
excluded_keywords = [
  "Banco de Galicia y Buenos Aires",
]
min_score = 1.0

[[scopes]]
name = "wallet_account"
pattern = '^CVU\s+(?P<account>\d{22})\s+CUIT'
scope_id_template = 'wallet_account:{account}'
label_template = 'CVU {account}'
product_type = "wallet_account"
account_template = '{account}'
currency = "ARS"
source_sections = ["movements"]

[extract]
strategy = "line_regex"
pdf_text_strategy = "x_band_table"

[extract.pdf_text_options]
row_merge_tolerance = 1.5
block_gap = 10.0
date_max_x = 75.0
description_min_x = 75.0
description_max_x = 210.0
operation_min_x = 210.0
operation_max_x = 290.0
amount_min_x = 290.0
amount_max_x = 360.0
balance_min_x = 360.0
balance_max_x = 430.0
date_pattern = '^\d{2}-\d{2}-\d{4}$'
trailing_operation_pattern = '^(?P<description>.+?)\s*(?P<operation_id>\d{9,15})$'
keep_text_patterns = [
  '^RESUMEN DE CUENTA$',
  '^CVU\s+\d{22}\s+CUIT',
  '^Periodo\s+',
  '^DETALLE DE MOVIMIENTOS$',
]
ignore_text_patterns = ['^\d+/\d+$']

[[extract.sections]]
name = "movements"
start_patterns = ['^DETALLE DE MOVIMIENTOS$']
stop_patterns = []
ignore_patterns = []
line_pattern = '^(?P<date>\d{2}-\d{2}-\d{4})\s+(?P<description>.+?)\s+(?P<operation_id>\d{9,15})\s+(?P<amount>-?\d{1,3}(?:\.\d{3})*,\d{2})\s+(?P<balance>-?\d{1,3}(?:\.\d{3})*,\d{2})$'
candidate_pattern = '^\d{2}-\d{2}-\d{4}\s+'
multiline = false
default_scope_product_type = "wallet_account"

[fields]
date = "date"
description = "description"
amount = "amount"
balance = "balance"
account_pattern = '^CVU\s+(\d{22})\s+CUIT'
currency = "currency"

[normalize]
date_formats = ['%d-%m-%Y']

[change_detection]
min_transactions = 10
min_match_ratio = 0.95
