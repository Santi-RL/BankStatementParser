[meta]
bank_id = "roela_ar"
format_id = "default"
version = 1
status = "published"
country = "AR"
currency_default = "ARS"
display_name = "Banco Roela (Arg.)"

[detect]
required_keywords = [
  "RESUMEN DE CUENTA CORRIENTE",
  "C.B.U.",
  "Período Desde",
]
excluded_keywords = []
min_score = 0.66

[extract]
strategy = "line_regex"
pdf_text_strategy = "roela_columns"
amount_sign = "rule_based"
line_pattern = '^(?P<code>[A-Za-z]?\d+)\s+(?P<reference>\S+)\s+(?P<description>.+?)\s+(?P<amount>\d{1,3}(?:,\d{3})*\.\d{2})$'
candidate_pattern = '^(?:\d{2}/\d{2}/\d{4}\s+)?[A-Za-z]?\d+\s+\S+\s+.+\d{1,3}(?:,\d{3})*\.\d{2}$'
current_date_pattern = '^(?P<date>\d{2}/\d{2}/\d{4})\s*'
strip_current_date = true
section_start_patterns = []
ignore_patterns = [
  '^IMPORTANTE',
  '^Titular/',
  '^Situación IVA',
  '^C\.B\.U\.',
  '^Domicilio',
  '^Período ',
  '^Fecha de Impresión',
  '^Hora de Impresión',
  '^SALDO AL ',
]
stop_patterns = ['^DE INTERES PARA USTED']
multiline = true

[extract.pdf_text_options]
header_cut = 260.0
footer_cut = 30.0
split_ratio = 0.515
margin_pt = 0.0
stop_keyword = "DE INTERES PARA USTED"

[extract.sign_rules]
field = "code"
default = "debit"
debit_codes = [
  "309", "313", "314", "317", "318", "319", "320", "321", "322", "323",
  "386", "396", "300100", "700100", "710100", "750100", "760100", "810100",
  "860100", "880100", "F30100",
]
credit_codes = [
  "305", "310", "324", "325", "332", "333", "334", "335",
  "720100", "740100", "770100", "F40001",
]

[extract.sign_rules.prefix_defaults]
"1" = "debit"
"2" = "debit"
"4" = "credit"
"5" = "credit"

[extract.sign_rules.prefix_credit_overrides]
"2" = ["290", "291", "296", "200001", "240001", "290001"]

[extract.sign_rules.prefix_debit_overrides]
"4" = ["400101", "400111"]
"5" = ["557", "583", "585", "586", "593", "594", "500131"]

[fields]
date = "date"
description = "description"
description_template = "{code} {reference} {description}"
amount = "amount"
balance = ""
account_pattern = 'Cuenta\s*:?\s*(\d+/\d+)'

[normalize]
date_formats = ['%d/%m/%Y']

[change_detection]
min_transactions = 10
min_match_ratio = 0.5
